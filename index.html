<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-title" content="Ava" />
<link rel="apple-touch-icon" href="robot.png" />
<title>Ava — English Coach</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{--ink:#2a2535;--muted:#9a93a6;--blue:#3b82f6;--blue-d:#2563eb;}
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;font-family:"Nunito",-apple-system,system-ui,sans-serif}
  body{background:#0b1020;display:flex;justify-content:center;align-items:center;}
  .app{width:100%;max-width:430px;height:100vh;background:#fff;position:relative;overflow:hidden;display:flex;flex-direction:column;}
  .stage{height:42%;position:relative;background:linear-gradient(160deg,#22386b,#0f1f3f);overflow:hidden}
  .stage img{width:100%;height:100%;object-fit:cover;object-position:center 28%;display:block;transition:transform .35s,filter .35s}
  .stage.spk img{transform:scale(1.04);filter:brightness(1.08)}
  .stage .ring{position:absolute;inset:0;box-shadow:inset 0 0 0 0 rgba(90,160,255,0);transition:.3s;pointer-events:none}
  .stage.spk .ring{box-shadow:inset 0 0 60px 6px rgba(90,160,255,.55)}
  .stage .svgfb{position:absolute;inset:0;display:flex;align-items:flex-end;justify-content:center}
  .topbar{position:absolute;top:14px;left:14px;right:14px;display:flex;align-items:center;gap:10px;z-index:3}
  .pill{background:rgba(0,0,0,.4);backdrop-filter:blur(4px);color:#fff;border:none;border-radius:30px;padding:8px 14px;font-weight:800;font-size:14px;cursor:pointer}
  .pill.round{width:42px;height:42px;padding:0;font-size:18px;border-radius:50%}
  .spd{margin-left:auto;min-width:64px}
  .banner{display:flex;align-items:center;gap:10px;margin:14px 16px 6px;background:linear-gradient(90deg,#f9a825,#f59e0b);color:#fff;border-radius:16px;padding:13px 16px;font-weight:800;font-size:16px;box-shadow:0 6px 16px rgba(245,158,11,.3)}
  .banner .b-ic{width:30px;height:30px;border-radius:50%;background:#fff;color:#f59e0b;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800}
  .feed{flex:1;overflow-y:auto;padding:8px 16px 6px;display:flex;flex-direction:column;gap:12px}
  .ava{display:flex;align-items:flex-start;gap:8px}
  .ava .bubble{background:#f1f1f4;color:var(--ink);border-radius:18px;padding:13px 16px;font-size:16px;font-weight:700;line-height:1.4;max-width:74%}
  .ava .vi{display:none;margin-top:7px;padding-top:7px;border-top:1px solid #ddd;color:#6b6478;font-size:14px;font-weight:700}
  .ava .vi.show{display:block}
  .acts{display:flex;flex-direction:column;gap:8px;padding-top:4px}
  .act{width:42px;height:42px;border-radius:50%;border:none;background:#eceaf0;color:#6b6478;font-size:17px;cursor:pointer}
  .you{align-self:flex-end;background:var(--blue);color:#fff;border-radius:18px 18px 4px 18px;padding:11px 15px;font-size:15px;font-weight:700;max-width:80%}
  .fix{align-self:flex-end;background:#fff4d6;border:1px solid #f3d27a;border-radius:14px;padding:10px 14px;max-width:84%}
  .fix .l{font-size:11px;font-weight:800;color:#b07c00;text-transform:uppercase}
  .fix .e{font-size:15px;font-weight:800;color:#7a3b00;margin-top:3px}
  .fix .n{font-size:13px;font-weight:700;color:#6a4a00;margin-top:5px;line-height:1.45}
  .fix .p{font-size:13px;font-weight:700;color:#7a3b00;margin-top:6px;background:rgba(255,255,255,.6);border-radius:9px;padding:6px 9px;line-height:1.4}
  .hint{align-self:center;background:#e8f0ff;border:1px dashed #9cc0ff;border-radius:14px;padding:11px 15px;max-width:90%;text-align:center}
  .hint .l{font-size:11px;font-weight:800;color:#2563eb;text-transform:uppercase}
  .hint .e{font-size:15px;font-weight:800;color:#1e3a8a;margin-top:3px}
  .hint .v{font-size:13px;font-weight:700;color:#64748b;margin-top:3px}
  .controls{padding:14px 24px calc(14px + env(safe-area-inset-bottom));display:flex;align-items:center;justify-content:space-between;background:#fff;border-top:1px solid #eee}
  .c-side{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer}
  .c-side .ic{width:58px;height:58px;border-radius:50%;background:#e8f0ff;color:var(--blue);display:flex;align-items:center;justify-content:center;font-size:22px}
  .c-side .lbl{font-size:13px;font-weight:800;color:var(--blue)}
  .mic{width:92px;height:92px;border-radius:50%;border:none;cursor:pointer;background:radial-gradient(circle at 50% 35%,#5aa0ff,#2563eb);color:#fff;font-size:34px;box-shadow:0 10px 28px rgba(37,99,235,.45)}
  .mic.live{background:radial-gradient(circle at 50% 35%,#fb7185,#e11d48);box-shadow:0 10px 28px rgba(225,29,72,.45)}
  .warn{margin:8px 16px;background:#fde2e2;color:#9b1c1c;font-size:12px;padding:9px;border-radius:12px;font-weight:700}
</style>
</head>
<body>
  <div class="app">
    <div class="stage" id="stage">
      <img id="botimg" src="robot.png" alt="Ava"
           onerror="this.style.display='none';document.getElementById('svgfb').style.display='flex';">
      <div class="svgfb" id="svgfb" style="display:none">
        <svg width="210" height="240" viewBox="0 0 220 250">
          <defs><linearGradient id="m" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fdfefe"/><stop offset="100%" stop-color="#c7d2e0"/></linearGradient></defs>
          <path d="M40 250 Q40 196 110 192 Q180 196 180 250 Z" fill="url(#m)"/>
          <rect x="62" y="58" width="96" height="104" rx="40" fill="url(#m)"/>
          <rect x="72" y="92" width="76" height="40" rx="20" fill="#16223a"/>
          <circle cx="93" cy="112" r="9" fill="#5aa0ff"/><circle cx="127" cy="112" r="9" fill="#5aa0ff"/>
        </svg>
      </div>
      <div class="ring"></div>
      <div class="topbar">
        <button class="pill round" id="reload" title="Bắt đầu lại">✕</button>
        <button class="pill" id="status">Bấm 🎤 để nói</button>
        <button class="pill spd" id="spd">🔊 1x</button>
      </div>
    </div>
    <div class="banner"><div class="b-ic">Aa</div> Speaking Section</div>
    <div class="feed" id="feed"></div>
    <div id="warnbox"></div>
    <div class="controls">
      <div class="c-side" id="typeBtn"><div class="ic">⌨️</div><div class="lbl">Type</div></div>
      <button class="mic" id="mic">🎤</button>
      <div class="c-side" id="inspireBtn"><div class="ic">💡</div><div class="lbl">Inspire</div></div>
    </div>
  </div>
<script>
const SYS_INSPIRE=`Based on the conversation, suggest ONE simple natural English sentence the learner Dũng could say next to Ava. Reply ONLY JSON: {"reply_en":"<the suggested sentence>","reply_vi":"<Vietnamese meaning>","correction":"","correction_vi":"","pronunciation":""}`;
const $=id=>document.getElementById(id);
let listening=false,recog=null,unlocked=false,convo=[],gotResult=false,silenceTimer=null;
const SPEEDS=[1,1.5,2,3,0.75];let spi=0;let rate=SPEEDS[spi];
const status=$('status'),feed=$('feed'),micBtn=$('mic'),stage=$('stage');
const player=new Audio();
function startSpk(){stage.classList.add('spk');}
function stopSpk(){stage.classList.remove('spk');}
player.onplay=()=>{startSpk();status.textContent='Ava đang nói…';};
player.onended=()=>{stopSpk();status.textContent='Tới lượt Thầy 😊';};
player.onerror=()=>stopSpk();
function silentURL(){const sr=8000,n=400,b=new ArrayBuffer(44+n),v=new DataView(b);const w=(o,s)=>{for(let i=0;i<s.length;i++)v.setUint8(o+i,s.charCodeAt(i));};w(0,'RIFF');v.setUint32(4,36+n,true);w(8,'WAVE');w(12,'fmt ');v.setUint32(16,16,true);v.setUint16(20,1,true);v.setUint16(22,1,true);v.setUint32(24,sr,true);v.setUint32(28,sr,true);v.setUint16(32,1,true);v.setUint16(34,8,true);w(36,'data');v.setUint32(40,n,true);for(let i=0;i<n;i++)v.setUint8(44+i,128);return URL.createObjectURL(new Blob([b],{type:'audio/wav'}));}
function unlock(){if(unlocked)return;unlocked=true;try{player.src=silentURL();player.play().catch(()=>{});}catch(e){}}
async function playTTS(text){try{const r=await fetch('/api/tts',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text,voice:'coral'})});const d=await r.json();if(d.audio){player.src='data:audio/mp3;base64,'+d.audio;player.playbackRate=rate;await player.play();}else fb(text);}catch(e){fb(text);}}
function fb(t){if(!window.speechSynthesis)return;const u=new SpeechSynthesisUtterance(t);u.lang='en-US';u.rate=Math.min(2,.95*rate);startSpk();u.onend=stopSpk;window.speechSynthesis.speak(u);}
function addAva(en,vi){const d=document.createElement('div');d.className='ava';
  d.innerHTML='<div class="bubble"><span class="en"></span><div class="vi"></div></div><div class="acts"><button class="act tr">🌐</button><button class="act pl">▶️</button></div>';
  d.querySelector('.en').textContent=en;d.querySelector('.vi').textContent=vi||'';
  d.querySelector('.tr').onclick=()=>d.querySelector('.vi').classList.toggle('show');
  d.querySelector('.pl').onclick=()=>playTTS(en);
  feed.appendChild(d);feed.scrollTop=feed.scrollHeight;}
function addYou(t){const d=document.createElement('div');d.className='you';d.textContent=t;feed.appendChild(d);feed.scrollTop=feed.scrollHeight;}
function addFix(corr,note,pron){const d=document.createElement('div');d.className='fix';
  let html='<div class="l">✏️ Sửa lại</div><div class="e"></div><div class="n"></div>';
  if(pron&&pron.trim())html+='<div class="p"></div>';
  d.innerHTML=html;
  d.querySelector('.e').textContent='✅ '+corr;
  d.querySelector('.n').textContent='💡 '+note;
  if(pron&&pron.trim())d.querySelector('.p').textContent='🗣️ Phát âm: '+pron.trim();
  feed.appendChild(d);feed.scrollTop=feed.scrollHeight;}
function addHint(en,vi){const d=document.createElement('div');d.className='hint';d.innerHTML='<div class="l">💡 Gợi ý câu nói</div><div class="e"></div><div class="v"></div>';d.querySelector('.e').textContent='“'+en+'”';d.querySelector('.v').textContent=vi||'';feed.appendChild(d);feed.scrollTop=feed.scrollHeight;playTTS(en);}
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
if(!SR){$('warnbox').innerHTML='<div class="warn">Trình duyệt chưa hỗ trợ nhận giọng nói. Thầy mở bằng Safari/Chrome nhé.</div>';}
else{recog=new SR();recog.lang='en-US';recog.interimResults=true;recog.continuous=false;
  recog.onresult=e=>{let f='',it='';for(let k=e.resultIndex;k<e.results.length;k++){const t=e.results[k][0].transcript;if(e.results[k].isFinal)f+=t;else it+=t;}
    if(it){status.textContent='Đang nghe… (bấm 🎤 khi xong)';clearTimeout(silenceTimer);silenceTimer=setTimeout(()=>{try{recog.stop();}catch(e){}},1800);}
    if(f){gotResult=true;clearTimeout(silenceTimer);try{recog.stop();}catch(e){}ask(f.trim(),'chat',true);}};
  recog.onend=()=>{listening=false;micBtn.classList.remove('live');micBtn.textContent='🎤';clearTimeout(silenceTimer);if(!gotResult)status.textContent='Chưa nghe rõ, bấm 🎤 nói lại nha';};
  recog.onerror=()=>{listening=false;micBtn.classList.remove('live');micBtn.textContent='🎤';clearTimeout(silenceTimer);status.textContent='Bấm 🎤 để nói';};}
micBtn.onclick=()=>{unlock();if(!player.paused)player.pause();
  if(listening){try{recog.stop();}catch(e){}return;}
  gotResult=false;try{recog.start();listening=true;micBtn.classList.add('live');micBtn.textContent='■';status.textContent='Đang nghe… (bấm 🎤 khi xong)';}catch(e){}};
$('typeBtn').onclick=()=>{unlock();const t=prompt("Thầy gõ câu muốn nói (tiếng Anh hoặc tiếng Việt):");if(t&&t.trim())ask(t.trim(),'chat',true);};
$('inspireBtn').onclick=()=>{unlock();ask("(suggest what I can say next)",'inspire',false);};
$('spd').onclick=()=>{spi=(spi+1)%SPEEDS.length;rate=SPEEDS[spi];$('spd').textContent='🔊 '+rate+'x';if(!player.paused){player.playbackRate=rate;}};
$('reload').onclick=()=>{convo=[];feed.innerHTML='';greet();};
async function ask(text,mode,showYou){
  listening=false;micBtn.classList.remove('live');micBtn.textContent='🎤';
  if(showYou)addYou(text);status.textContent='Đang nghĩ…';
  convo.push({role:'user',content:text});
  const body=mode==='inspire'?{system:SYS_INSPIRE,messages:convo}:{messages:convo};
  try{
    const res=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
    const data=await res.json();let o={};
    try{o=JSON.parse(data.reply);}catch(_){o={reply_en:"Sorry, say that again?",reply_vi:"",correction:"",correction_vi:"",pronunciation:""};}
    if(mode==='inspire'){addHint(o.reply_en||'',o.reply_vi||'');status.textContent='Tới lượt Thầy 😊';return;}
    convo.push({role:'assistant',content:o.reply_en||''});
    if(o.correction&&o.correction.trim())addFix(o.correction.trim(),o.correction_vi||'',o.pronunciation||'');
    addAva(o.reply_en||'',o.reply_vi||'');playTTS(o.reply_en||'');
  }catch(e){status.textContent='Lỗi mạng, thử lại nha Thầy';}
}
function greet(){const en="Hey Dũng! How's your day going so far?";const vi="Chào Thầy! Hôm nay của Thầy thế nào rồi ạ?";convo.push({role:'assistant',content:en});addAva(en,vi);}
window.addEventListener('load',()=>{fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:'hi'}]})}).catch(()=>{});greet();});
</script>
</body>
</html>
