<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Ava — English Coach</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; font-family: -apple-system, "Segoe UI", system-ui, sans-serif; }
  body {
    background: radial-gradient(circle at 50% 0%, #1a2238, #0a0e1a);
    display: flex; justify-content: center; align-items: center; padding: 12px;
  }
  .phone {
    width: 100%; max-width: 400px; height: 92vh; max-height: 820px;
    background: #070b14; border-radius: 40px; border: 8px solid #1c2333;
    box-shadow: 0 24px 70px rgba(0,0,0,.6); position: relative;
    overflow: hidden; display: flex; flex-direction: column;
  }
  .top {
    height: 38%; display: flex; flex-direction: column; align-items: center;
    justify-content: center; position: relative;
    background: linear-gradient(180deg,#101a30,#0a1322);
  }
  .glow {
    position: absolute; width: 230px; height: 230px; border-radius: 50%;
    background: radial-gradient(circle,#2563eb,transparent 70%);
    opacity: .35; transition: all .3s; z-index: 1;
  }
  .glow.on { opacity: .9; transform: scale(1.08); }
  svg.robot { position: relative; z-index: 2; }
  .name { margin-top: 8px; color: #e6edff; font-weight: 700; font-size: 15px; z-index: 2; letter-spacing: .5px; }
  .status { color: #7c8bb0; font-size: 12px; margin-top: 2px; z-index: 2; }
  .bottom {
    flex: 1; display: flex; flex-direction: column; padding: 12px 14px 16px;
    background: #0a0e1a; min-height: 0;
  }
  .chat { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; padding-right: 4px; min-height: 0; }
  .bubble { max-width: 82%; padding: 9px 13px; border-radius: 16px; font-size: 14px; line-height: 1.4; word-wrap: break-word; }
  .me { align-self: flex-end; background: #2563eb; color: #fff; }
  .ava { align-self: flex-start; background: #1e2536; color: #cdd6e6; }
  .interim { align-self: flex-end; background: rgba(37,99,235,.5); color: #fff; font-style: italic; }
  .mic {
    margin-top: 12px; border: none; color: #fff; font-weight: 700; font-size: 16px;
    padding: 15px; border-radius: 18px; cursor: pointer; transition: all .2s;
    background: #22c55e; box-shadow: 0 0 0 8px rgba(34,197,94,.13);
  }
  .mic.live { background: #ef4444; box-shadow: 0 0 0 8px rgba(239,68,68,.2); }
  .hint { text-align: center; color: #637096; font-size: 11px; margin-top: 8px; }
  .warn { background: #7f1d1d; color: #fee; font-size: 12px; padding: 8px; border-radius: 10px; margin-top: 6px; }
</style>
</head>
<body>
  <div class="phone">
    <div class="top">
      <div class="glow" id="glow"></div>
      <svg class="robot" width="170" height="170" viewBox="0 0 200 200">
        <defs>
          <linearGradient id="head" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#e9eefb"/><stop offset="100%" stop-color="#aebbd8"/>
          </linearGradient>
        </defs>
        <line x1="100" y1="30" x2="100" y2="14" stroke="#7c8bb0" stroke-width="4"/>
        <circle id="antenna" cx="100" cy="11" r="6" fill="#60a5fa"/>
        <rect x="40" y="35" width="120" height="115" rx="28" fill="url(#head)" stroke="#8595b8" stroke-width="3"/>
        <circle cx="76" cy="85" r="13" fill="#1b2236"/><circle cx="124" cy="85" r="13" fill="#1b2236"/>
        <circle cx="76" cy="85" r="5" fill="#60a5fa"/><circle cx="124" cy="85" r="5" fill="#60a5fa"/>
        <rect id="mouth" x="74" y="114" width="52" height="6" rx="6" fill="#1b2236"/>
        <circle cx="55" cy="110" r="6" fill="#60a5fa" opacity=".5"/>
        <circle cx="145" cy="110" r="6" fill="#60a5fa" opacity=".5"/>
      </svg>
      <div class="name">AVA · English Coach</div>
      <div class="status" id="status">ready</div>
    </div>
    <div class="bottom">
      <div class="chat" id="chat"></div>
      <div id="warnbox"></div>
      <button class="mic" id="mic">🎤  Tap to speak</button>
      <div class="hint">Bấm nút, nói tiếng Anh — Ava sẽ trả lời bằng giọng nói</div>
    </div>
  </div>

<script>
const SYSTEM_PROMPT = `You are "Ava", a warm, patient English conversation coach.
The learner is a 65-year-old Vietnamese real estate teacher practicing GENERAL English conversation (travel, work, daily life). Rules:
- Reply in SHORT, natural spoken English (1-3 sentences max). This is a voice chat.
- Always end with a friendly follow-up question to keep the conversation going.
- If the learner makes a clear grammar mistake, gently offer the correct version in ONE short line, then continue.
- Speak simply and encouragingly. Never lecture. Be conversational.`;

const chat = document.getElementById('chat');
const statusEl = document.getElementById('status');
const glow = document.getElementById('glow');
const mouth = document.getElementById('mouth');
const antenna = document.getElementById('antenna');
const micBtn = document.getElementById('mic');
const warnbox = document.getElementById('warnbox');

let messages = [];
let listening = false, speaking = false;
let recog = null, mouthTimer = null, interimEl = null;

function addBubble(text, who) {
  const d = document.createElement('div');
  d.className = 'bubble ' + who;
  d.textContent = text;
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;
  return d;
}
function setStatus(s){ statusEl.textContent = s; }

function startMouth(){ stopMouth(); glow.classList.add('on'); antenna.setAttribute('fill','#22c55e');
  mouthTimer = setInterval(()=>{ const h=6+Math.random()*26; mouth.setAttribute('y',114-(h-6)/2); mouth.setAttribute('height',h); },90); }
function stopMouth(){ if(mouthTimer)clearInterval(mouthTimer); mouthTimer=null; mouth.setAttribute('y',114); mouth.setAttribute('height',6);
  glow.classList.remove('on'); antenna.setAttribute('fill','#60a5fa'); }

function speak(text){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang='en-US'; u.rate=.96; u.pitch=1.05;
  const vs = window.speechSynthesis.getVoices();
  const p = vs.find(v=>/female|samantha|zira|google us english/i.test(v.name)&&v.lang.startsWith('en')) || vs.find(v=>v.lang==='en-US');
  if(p) u.voice=p;
  u.onstart=()=>{ speaking=true; startMouth(); setStatus('speaking…'); };
  u.onend=()=>{ speaking=false; stopMouth(); setStatus('ready'); };
  window.speechSynthesis.speak(u);
}

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if(!SR){ warnbox.innerHTML='<div class="warn">Trình duyệt này chưa hỗ trợ nhận giọng nói. Thầy dùng Safari/Chrome mới nhé.</div>'; }
else {
  recog = new SR(); recog.lang='en-US'; recog.interimResults=true; recog.continuous=false;
  recog.onresult = (e)=>{ let final='',inter='';
    for(let i=e.resultIndex;i<e.results.length;i++){ const t=e.results[i][0].transcript; if(e.results[i].isFinal)final+=t; else inter+=t; }
    if(inter){ if(!interimEl){ interimEl=document.createElement('div'); interimEl.className='bubble interim'; chat.appendChild(interimEl);} interimEl.textContent=inter; chat.scrollTop=chat.scrollHeight; }
    if(final){ if(interimEl){interimEl.remove();interimEl=null;} handleUser(final.trim()); }
  };
  recog.onend=()=>{ listening=false; micBtn.classList.remove('live'); micBtn.textContent='🎤  Tap to speak'; if(!speaking)setStatus('ready'); };
  recog.onerror=()=>{ listening=false; micBtn.classList.remove('live'); micBtn.textContent='🎤  Tap to speak'; };
}

micBtn.onclick = ()=>{
  if(speaking){ window.speechSynthesis.cancel(); speaking=false; stopMouth(); }
  if(listening){ recog.stop(); return; }
  try{ recog.start(); listening=true; micBtn.classList.add('live'); micBtn.textContent='■  Stop'; setStatus('listening…'); if(interimEl){interimEl.remove();interimEl=null;} }catch(e){}
};

async function handleUser(text){
  listening=false; micBtn.classList.remove('live'); micBtn.textContent='🎤  Tap to speak';
  addBubble(text,'me');
  messages.push({role:'user',content:text});
  setStatus('thinking…');
  try{
    const res = await fetch('/api/chat',{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ system:SYSTEM_PROMPT, messages }) });
    const data = await res.json();
    const reply = (data.reply || 'Sorry, could you say that again?').trim();
    addBubble(reply,'ava');
    messages.push({role:'assistant',content:reply});
    speak(reply);
  }catch(err){
    const fb='Hmm, I had a little trouble. Can you try again?';
    addBubble(fb,'ava'); speak(fb);
  }
}

// greet on load
window.addEventListener('load',()=>{ setTimeout(()=>{ const g="Hi! I'm Ava, your English coach. How are you today?"; addBubble(g,'ava'); messages.push({role:'assistant',content:g}); speak(g); },700); });
if(window.speechSynthesis) window.speechSynthesis.onvoiceschanged=()=>{};
</script>
</body>
</html>
